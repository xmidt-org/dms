---
name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - MAINTAINERS.md
      - LICENSE
      - NOTICE
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:

permissions:
  pull-requests: read
  contents:       write
  packages:       write

jobs:
  ci:
    uses: xmidt-org/shared-go/.github/workflows/ci.yml@e8e27665ab2158bd4d27d5bc2250e99db7c66ae0 # v4.9.39
    with:
      release-arch-arm64:    true
      release-arch-amd64:    true
      release-docker:        true
      release-docker-latest: true
      release-docker-major:  true
      release-docker-minor:  true
      release-docker-extras: |
        .release/docker
        LICENSE
        NOTICE
      release-type:   program
      yaml-lint-skip: false
    secrets: inherit
